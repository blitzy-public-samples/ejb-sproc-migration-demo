# =============================================================================
# marketplace-service - Spring Boot configuration
# -----------------------------------------------------------------------------
# Replaces the legacy JBoss EAP JPA bootstrap descriptor
# (kitchensink/src/main/resources/META-INF/persistence.xml) and the
# JBoss "KitchensinkPostgreDS" JNDI datasource. Product catalog, pricing and
# vendor-selection domain (bounded context).
#
# PURE PRODUCER: marketplace-service makes NO outbound HTTP calls. The
# HTTP-client configuration (downstream service URLs) lives only in
# orders-service and users-service, never here.
# =============================================================================

# --- Application identity (actuator /info + metrics labeling; matches artifactId) ---
spring.application.name=marketplace-service

# --- Server / bounded-context endpoint base (e.g. GET /marketplace/api/products/...) ---
server.port=8081
server.servlet.context-path=/marketplace

# --- Datasource (replaces the JTA java:jboss/datasources/KitchensinkPostgreDS) ---
# Credentials are supplied via environment variables, never hard-coded.
spring.datasource.url=jdbc:postgresql://localhost:5432/kitchensink
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
# ddl-auto=validate  <- legacy hibernate.hbm2ddl.auto=validate
# The externally managed schema (db/01_schema.sql) is authoritative; Hibernate
# only validates the owned entities (Product, Vendor, VendorInventory,
# VendorInventoryId -> tables products, vendors, vendor_inventory). Unowned
# tables shared in the same physical database are simply unmapped here.
spring.jpa.hibernate.ddl-auto=validate
# database-platform  <- legacy hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Actuator (backs GET /marketplace/actuator/health -> {"status":"UP"}) ---
management.endpoints.web.exposure.include=health,info,metrics
