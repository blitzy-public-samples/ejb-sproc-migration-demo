spring.application.name=marketplace-service
server.port=8081
server.servlet.context-path=/marketplace
spring.datasource.url=jdbc:postgresql://localhost:5432/kitchensink
# Datasource credentials are supplied from the environment (no committed secrets, CWE-798).
# Set SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD (env or secrets) at runtime.
# Integration tests override these via @DynamicPropertySource (Testcontainers), so the
# placeholders are shadowed and never resolved during the test run.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
# Hibernate auto-detects the PostgreSQL dialect from the JDBC connection; an explicit dialect
# is unnecessary and emits a startup warning on current Hibernate, so it is intentionally omitted.
# Disable Open Session In View to avoid the default OSIV warning and keep transactional
# boundaries explicit in the service layer.
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=health
