# =============================================================================
# Spring Boot TEST profile - kitchensink (Net32) integration tests.
# Activated via @ActiveProfiles("test") on the six @SpringBootTest ITs:
#   PricingServiceIT, DiscountServiceIT, OrderServiceIT,
#   TierRecalculationIT, MemberRegistrationIT, RemoteMemberRegistrationIT.
#
# MIGRATION (JBoss EAP 8 / Jakarta EE 10  ->  Spring Boot 3.x):
# This file REPLACES the deleted Arquillian test wiring -
#   - src/test/resources/test-ds.xml                   (old H2 JNDI datasource)
#   - src/test/resources/META-INF/test-persistence.xml (JBoss PU 'primary', create-drop)
# The old create-drop is INTENTIONALLY replaced by ddl-auto=validate so the test
# run mirrors production exactly: Hibernate validates the 10 JPA entities against
# the externally-owned authoritative schema and fails fast on any divergence
# (the "schema management stays external" rule).
#
# DATABASE: Testcontainers PostgreSQL (preferred over H2) because the seed uses
# PostgreSQL-specific syntax - OVERRIDING SYSTEM VALUE, ON CONFLICT (...) DO NOTHING,
# and setval('..._id_seq', ...) - that H2 does not fully support. The schema and
# seed are the authoritative, externally-owned SQL files (reference only):
#   schema = db/01_schema.sql      seed = db/03_seed_data.sql
# These live OUTSIDE src/test/resources (so they are NOT on the classpath) and are
# referenced via file:/TC_INITSCRIPT paths relative to the Maven module root - the
# Surefire/Failsafe working directory is kitchensink/, so file:db/... resolves to
# kitchensink/db/...  (NEVER use classpath: for these).
#
# NOTE: server.servlet.context-path is intentionally NOT set here (production sets
# /kitchensink). Leaving it at the default root keeps the controllers at /api/... so
# that RemoteMemberRegistrationIT can POST to /api/members and receive HTTP 200.
# =============================================================================

# --- Datasource: Testcontainers PostgreSQL via the jdbc:tc: URL scheme ---
# org.testcontainers.jdbc.ContainerDatabaseDriver lazily starts a postgres:16-alpine
# container on the first JDBC connection and runs TC_INITSCRIPT (the authoritative
# schema) exactly once. 16-alpine is the PostgreSQL image available to the test
# environment; any PostgreSQL >= 10 supports the seed syntax. Container credentials
# are managed by Testcontainers, so no datasource username/password is required here.
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///kitchensink?TC_INITSCRIPT=file:db/01_schema.sql
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# --- JPA / Hibernate (mirror production application.properties) ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# --- Seed data ---
# TC_INITSCRIPT runs only ONE script (the schema), so the seed is loaded via Spring
# SQL init. defer-datasource-initialization=true runs the seed AFTER Hibernate
# validate; the schema already exists (TC_INITSCRIPT ran on the first connection), so
# validate passes and the seed (idempotent: ON CONFLICT DO NOTHING) then populates it.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=file:db/03_seed_data.sql
