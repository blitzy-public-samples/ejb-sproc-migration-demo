# ==========================================================================
# users-service — Spring Boot externalized configuration
# Replaces monolith kitchensink/src/main/resources/META-INF/persistence.xml
# (persistence-unit "primary") and the JBoss KitchensinkPostgreDS managed datasource.
# ==========================================================================

# --- Service identity ---
spring.application.name=users-service

# --- Server (port 8083, context-path /users) ---
server.port=8083
server.servlet.context-path=/users

# --- Datasource (replaces JTA-managed java:jboss/datasources/KitchensinkPostgreDS) ---
# Credentials supplied via environment variables — never hard-coded.
spring.datasource.url=jdbc:postgresql://localhost:5432/kitchensink
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
# ddl-auto=validate maps from legacy hibernate.hbm2ddl.auto=validate; the externally
# managed schema (kitchensink/db/01_schema.sql) is authoritative. users-service auto-scans
# ONLY its owned entity (Member -> table "member"); all other tables are unmapped here,
# so per-service validation succeeds even though the three services share one database.
spring.jpa.hibernate.ddl-auto=validate
# database-platform maps from legacy hibernate.dialect.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Actuator (backs GET /users/actuator/health -> {"status":"UP"}) ---
management.endpoints.web.exposure.include=health,info,metrics

# --- Downstream service (consumer) ---
# Injected into OrdersClient via @Value("${services.orders.base-url}") for Contract 3
# (member spend) calls during nightly tier recalculation. URL = orders port 8082 + ctx /orders.
services.orders.base-url=http://localhost:8082/orders

# --- Service-to-service shared token (internal + member-scoped access control) ------
# Guards the users-service spend-mutation endpoint (POST /api/members/{id}/spend) so only trusted
# peer services (orders-service) may change a member's total_spend, authenticates the SERVICE/admin
# caller on the member-scoped read endpoints (GET /api/members, /api/members/{id},
# /api/members/{id}/tier), and is the HMAC signing key for member access tokens
# (see CallerAuthenticator). It is also presented by OrdersClient on its outbound spend-read call to
# orders-service's token-guarded /internal/** endpoint.
#
# REQUIRED, NO DEFAULT (CWE-798): the value MUST be supplied via the SECURITY_INTERNAL_TOKEN
# environment variable (Spring relaxed binding). There is intentionally NO fallback literal, so
# a deployment that forgets to set it FAILS FAST at startup (the @Value("${security.internal.token}")
# injection cannot resolve) rather than silently running with a publicly-known token. All three
# cooperating services must share the SAME value. Tests supply a throwaway value via
# @DynamicPropertySource (never in this production config).
security.internal.token=${SECURITY_INTERNAL_TOKEN}

# --- Registration abuse control (rate limiting) ------------------------------
# Maximum number of POST /api/members (member registration) requests permitted per client IP per
# 60-second fixed window before further attempts are rejected with HTTP 429. Registration stays
# UNAUTHENTICATED (AAP member-create parity: 200 OK, no auth) so this lightweight per-IP limiter is
# the abuse control for the open endpoint. Override via SECURITY_REGISTRATION_MAX_PER_MINUTE; tests
# raise it (or exercise it directly) via @DynamicPropertySource.
security.registration.max-per-minute=${SECURITY_REGISTRATION_MAX_PER_MINUTE:20}
