# ==========================================================================
# users-service — Spring Boot externalized configuration
# Replaces monolith kitchensink/src/main/resources/META-INF/persistence.xml
# (persistence-unit "primary") and the JBoss KitchensinkPostgreDS managed datasource.
# ==========================================================================

# --- Service identity ---
spring.application.name=users-service

# --- Server (port 8083, context-path /users) ---
server.port=8083
server.servlet.context-path=/users

# --- Forwarded-header handling (SECURITY: CWE-348 abuse-control hardening) ---
# Explicitly DISABLE forwarded-header processing. This service is deployed as a standalone executable
# JAR / container reached directly (the migration's deployment model — see README) and is NOT fronted
# by a trusted reverse proxy. When left unset, Spring Boot auto-enables NATIVE forwarded-header handling
# upon detecting a cloud platform (e.g. the KUBERNETES_SERVICE_HOST env var present in the build/runtime
# pod); that installs Tomcat's RemoteIp valve, which rewrites request.getRemoteAddr() from the fully
# client-controlled X-Forwarded-For header (and strips the header). Because the per-IP registration rate
# limiter (RegistrationRateLimitInterceptor) keys on getRemoteAddr(), trusting that header lets a direct
# attacker rotate X-Forwarded-For to reset the counter and bypass the limit (CWE-348). Pinning the
# strategy to 'none' makes getRemoteAddr() the true TCP peer regardless of any client-supplied forwarded
# header. If this service is ever placed behind a trusted proxy, switch to 'framework' with a
# trusted-proxy allowlist rather than relying on the platform default.
server.forward-headers-strategy=none

# --- Datasource (replaces JTA-managed java:jboss/datasources/KitchensinkPostgreDS) ---
# Credentials supplied via environment variables — never hard-coded.
spring.datasource.url=jdbc:postgresql://localhost:5432/kitchensink
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
# ddl-auto=validate maps from legacy hibernate.hbm2ddl.auto=validate; the externally
# managed schema (kitchensink/db/01_schema.sql) is authoritative. users-service auto-scans
# ONLY its owned entity (Member -> table "member"); all other tables are unmapped here,
# so per-service validation succeeds even though the three services share one database.
spring.jpa.hibernate.ddl-auto=validate
# database-platform maps from legacy hibernate.dialect.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Actuator (backs GET /users/actuator/health -> {"status":"UP"}) ---
management.endpoints.web.exposure.include=health,info,metrics

# --- Downstream service (consumer) ---
# Injected into OrdersClient via @Value("${services.orders.base-url}") for Contract 3
# (member spend) calls during nightly tier recalculation. URL = orders port 8082 + ctx /orders.
services.orders.base-url=http://localhost:8082/orders

# --- Outbound HTTP-client resilience (shared RestTemplate timeouts) ----------
# The connect/read timeouts that bound every Contract-3 spend call (OrdersClient) issued during
# the nightly tier recalculation — so a slow or hung orders-service peer cannot block the
# recalculation caller thread indefinitely (thread / connection-pool exhaustion risk) — are
# applied IN CODE by RestTemplateConfig via @Value("${services.http-client.connect-timeout-ms:2000}")
# / @Value("${services.http-client.read-timeout-ms:5000}"), i.e. safe built-in defaults of
# 2000 ms connect / 5000 ms read. No property-file entry is required. On expiry the RestTemplate
# raises ResourceAccessException, which OrdersClient translates to ServiceUnavailableException
# (HTTP 503): the AAP fail-fast resilience posture. Override per environment WITHOUT a property
# line via SERVICES_HTTP_CLIENT_CONNECT_TIMEOUT_MS / SERVICES_HTTP_CLIENT_READ_TIMEOUT_MS
# (Spring relaxed binding resolves these directly against the @Value defaults).

# --- Service-to-service shared token (internal endpoints only) ---------------
# Guards ONLY the users-service spend-mutation endpoint (POST /api/members/{id}/spend) via
# InternalServiceAuthInterceptor, so only trusted peer services (orders-service) may change a
# member's total_spend; the same shared token is presented by OrdersClient on its outbound
# spend-read call to orders-service's token-guarded /internal/** endpoint. The member READ surface
# (GET /api/members, GET /api/members/{id}, GET /api/members/{id}/tier) and the actuator endpoints
# are intentionally OPEN and unauthenticated for storefront continuity (AAP §0.3.4 / §0.7.1) — the
# token does NOT guard them; member registration (POST /api/members) is likewise open, protected
# only by the per-IP rate limiter below.
#
# REQUIRED, NO DEFAULT (CWE-798): the token is injected directly from the SECURITY_INTERNAL_TOKEN
# environment variable via @Value("${security.internal.token}") (Spring relaxed binding), so NO
# property-file entry is declared here. There is intentionally no fallback literal: a deployment
# that forgets to set the variable FAILS FAST at startup (the @Value injection cannot resolve)
# rather than silently running with a publicly-known token. All three cooperating services must
# share the SAME value. Tests supply a throwaway value via @DynamicPropertySource.

# --- Registration abuse control (rate limiting) ------------------------------
# The maximum number of POST /api/members (member registration) requests permitted per client IP
# per 60-second fixed window before further attempts are rejected with HTTP 429 is applied IN CODE
# by RegistrationRateLimitInterceptor via @Value("${security.registration.max-per-minute:20}"),
# i.e. a safe built-in default of 20/min. No property-file entry is required. Registration stays
# UNAUTHENTICATED (AAP member-create parity: 200 OK, no auth) so this lightweight per-IP limiter is
# the abuse control for the open endpoint. Because getRemoteAddr() must be the true TCP peer for
# the limiter to be sound, server.forward-headers-strategy=none (above) is a hard dependency of
# this control. Override per environment WITHOUT a property line via
# SECURITY_REGISTRATION_MAX_PER_MINUTE (Spring relaxed binding); tests raise it (or exercise it
# directly) via @DynamicPropertySource.
