# =============================================================================
# orders-service - Spring Boot 3.x externalized configuration
# -----------------------------------------------------------------------------
# Bounded context: shopping cart, order orchestration, discounting, shipping.
# Replaces the legacy JBoss EAP JPA descriptor + KitchensinkPostgreDS datasource
# (kitchensink/src/main/resources/META-INF/persistence.xml). No XML carried over;
# persistence.xml is a pattern reference only.
# =============================================================================

# --- Service identity (actuator /info, metrics labeling) ---------------------
spring.application.name=orders-service

# --- Embedded server: port 8082, all endpoints served under /orders ----------
# e.g. POST /orders/api/orders/submit/{memberId},
#      GET  /orders/internal/members/{id}/spend,
#      health at GET /orders/actuator/health.
# server.port MUST match the orders-service Dockerfile EXPOSE 8082.
server.port=8082
server.servlet.context-path=/orders

# --- Datasource: replaces the legacy JBoss EAP managed datasource ------------
# All three services point at the same physical "kitchensink" database.
# Credentials are injected from environment variables - never hard-coded.
spring.datasource.url=jdbc:postgresql://localhost:5432/kitchensink
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---------------------------------------------------------
# validate (mapped from legacy hibernate.hbm2ddl.auto): orders-service auto-scans
# ONLY its 5 owned entities (Order, OrderItem, OrderDraftItem, ShippingZone,
# DiscountAudit -> tables orders, order_items, order_draft_items, shipping_zones,
# discount_audit). Unowned tables in the shared DB are unmapped and ignored, so
# validation succeeds per service.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Actuator: backs the required GET /orders/actuator/health -> {"status":"UP"}
management.endpoints.web.exposure.include=health,info,metrics

# --- Downstream services (orders-service CONSUMER additions) -----------------
# Injected via @Value("${services.*.base-url}") into the thin HTTP @Component
# clients (MarketplaceClient, UsersClient). Each URL combines the peer service's
# port and context-path. Spring relaxed binding accepts the environment overrides
# SERVICES_MARKETPLACE_BASE_URL / SERVICES_USERS_BASE_URL.
services.marketplace.base-url=http://localhost:8081/marketplace
services.users.base-url=http://localhost:8083/users

# --- Outbound HTTP-client resilience (shared RestTemplate timeouts) ----------
# Bound every cross-service call (MarketplaceClient price/quote, UsersClient tier/spend) so a
# slow or hung peer cannot block an orders-service request thread indefinitely -> otherwise the
# Tomcat worker pool and the Hikari connection pool are exhausted and orders-service cascades to
# unavailable. On expiry the RestTemplate raises ResourceAccessException, which the thin client
# components translate to ServiceUnavailableException (HTTP 503): the AAP's fail-fast resilience
# posture. Values are in milliseconds; RestTemplateConfig applies safe defaults (2000 / 5000) if
# these are omitted. Override per environment via SERVICES_HTTP_CLIENT_CONNECT_TIMEOUT_MS /
# SERVICES_HTTP_CLIENT_READ_TIMEOUT_MS (Spring relaxed binding).
services.http-client.connect-timeout-ms=2000
services.http-client.read-timeout-ms=5000

# --- Service-to-service shared token (internal + member-scoped access control) ------
# Guards the orders-service internal endpoints (/orders/internal/**) so only trusted peer
# services may read member spend, authenticates the SERVICE/admin caller on the member-scoped
# /orders/api/orders/** endpoints, and is the HMAC signing key for member access tokens
# (see CallerAuthenticator). It is also presented by UsersClient on the users-service
# spend-mutation and tier calls.
#
# REQUIRED, NO DEFAULT (CWE-798): the value MUST be supplied via the SECURITY_INTERNAL_TOKEN
# environment variable (Spring relaxed binding). There is intentionally NO fallback literal, so
# a deployment that forgets to set it FAILS FAST at startup (the @Value("${security.internal.token}")
# injection cannot resolve) rather than silently running with a publicly-known token. All three
# cooperating services must share the SAME value. Tests supply a throwaway value via
# @DynamicPropertySource (never in this production config).
security.internal.token=${SECURITY_INTERNAL_TOKEN}
