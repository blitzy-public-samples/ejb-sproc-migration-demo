# =============================================================================
# orders-service - Spring Boot 3.x externalized configuration
# -----------------------------------------------------------------------------
# Bounded context: shopping cart, order orchestration, discounting, shipping.
# Replaces the legacy JBoss EAP JPA descriptor + KitchensinkPostgreDS datasource
# (kitchensink/src/main/resources/META-INF/persistence.xml). No XML carried over;
# persistence.xml is a pattern reference only.
# =============================================================================

# --- Service identity (actuator /info, metrics labeling) ---------------------
spring.application.name=orders-service

# --- Embedded server: port 8082, all endpoints served under /orders ----------
# e.g. POST /orders/api/orders/submit/{memberId},
#      GET  /orders/internal/members/{id}/spend,
#      health at GET /orders/actuator/health.
# server.port MUST match the orders-service Dockerfile EXPOSE 8082.
server.port=8082
server.servlet.context-path=/orders

# --- Datasource: replaces the legacy JBoss EAP managed datasource ------------
# All three services point at the same physical "kitchensink" database.
# Credentials are injected from environment variables - never hard-coded.
spring.datasource.url=jdbc:postgresql://localhost:5432/kitchensink
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---------------------------------------------------------
# validate (mapped from legacy hibernate.hbm2ddl.auto): orders-service auto-scans
# ONLY its 5 owned entities (Order, OrderItem, OrderDraftItem, ShippingZone,
# DiscountAudit -> tables orders, order_items, order_draft_items, shipping_zones,
# discount_audit). Unowned tables in the shared DB are unmapped and ignored, so
# validation succeeds per service.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Actuator: backs the required GET /orders/actuator/health -> {"status":"UP"}
management.endpoints.web.exposure.include=health,info,metrics

# --- Downstream services (orders-service CONSUMER additions) -----------------
# Injected via @Value("${services.*.base-url}") into the thin HTTP @Component
# clients (MarketplaceClient, UsersClient). Each URL combines the peer service's
# port and context-path. Spring relaxed binding accepts the environment overrides
# SERVICES_MARKETPLACE_BASE_URL / SERVICES_USERS_BASE_URL.
services.marketplace.base-url=http://localhost:8081/marketplace
services.users.base-url=http://localhost:8083/users

# --- Outbound HTTP-client resilience (shared RestTemplate timeouts) ----------
# The connect/read timeouts that bound every cross-service call (MarketplaceClient price/quote,
# UsersClient tier/spend) so a slow or hung peer cannot block an orders-service request thread
# indefinitely (Tomcat worker + Hikari pool exhaustion risk) are applied IN CODE by
# RestTemplateConfig via @Value("${services.http-client.connect-timeout-ms:2000}") /
# @Value("${services.http-client.read-timeout-ms:5000}") — i.e. safe built-in defaults of
# 2000 ms connect / 5000 ms read. No property-file entry is required. On expiry the RestTemplate
# raises ResourceAccessException, which the thin clients translate to ServiceUnavailableException
# (HTTP 503): the AAP fail-fast resilience posture. Override per environment WITHOUT a property
# line via SERVICES_HTTP_CLIENT_CONNECT_TIMEOUT_MS / SERVICES_HTTP_CLIENT_READ_TIMEOUT_MS
# (Spring relaxed binding resolves these directly against the @Value defaults).

# --- Service-to-service shared token (internal endpoints only) ---------------
# Guards the orders-service internal spend-read endpoint (GET /orders/internal/**) via
# InternalServiceAuthInterceptor so only trusted peer services may read member spend; the same
# shared token is presented by UsersClient on its outbound calls to users-service. The PUBLIC
# cart/order surface (/orders/api/orders/**: cart, preview, submit, lookup, history) and the
# actuator endpoints are intentionally OPEN and unauthenticated for storefront continuity
# (AAP §0.3.4 / §0.7.1) — the token does NOT guard them.
#
# REQUIRED, NO DEFAULT (CWE-798): the token is injected directly from the SECURITY_INTERNAL_TOKEN
# environment variable via @Value("${security.internal.token}") (Spring relaxed binding), so NO
# property-file entry is declared here. There is intentionally no fallback literal: a deployment
# that forgets to set the variable FAILS FAST at startup (the @Value injection cannot resolve)
# rather than silently running with a publicly-known token. All three cooperating services must
# share the SAME value. Tests supply a throwaway value via @DynamicPropertySource.
